[fujinet]
build_platform = BUILD_COCO
build_bus      = DRIVEWIRE
build_board    = fujinet-coco-becker-esp32-s3-wroom-1-n16r8

[env:fujinet-coco-becker-esp32-s3-wroom-1-n16r8]
platform = espressif32@${fujinet.esp32_platform_version}
platform_packages = ${fujinet.esp32_platform_packages}
board = esp32-s3-wroom-1-n16r8
build_type = debug
build_flags =
    ${env.build_flags}
    -D PINMAP_ESP32S3_WROOM_1
    -D COCO_CART
board_build.partitions = fujinet_partitions_16MB.csv
